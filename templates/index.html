<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Miner Page</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>Online Voting Powered by BlockVote</h1>
        <h2>Admin/Voter Login</h2>
        <form action="#" method="POST">
            <h3>Enter Your ID</h3>
            <p>Use ID starting with ADM for admin access.</p>
            <p>Voters can continue directly with Vote.</p>
            <input type="text" name="minerID" required>
            <div class="button-row">
            <button type="submit" name="submit" value="mine">Past Record</button>
            <button type="submit" name="submit" value="vote" formnovalidate>Vote</button>
            </div>
        </form>
        </div>
</body>
</html>
